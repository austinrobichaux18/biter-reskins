[mod-setting-description]
startup-message-setting=This will display an informative message on world start explaining how to find the settings to change skins. Recommended to turn this off once you've read it once. 
enemy-spawner-scale-setting=Ranges (.1-10) Multiples values by this number. .1 will make them smaller. Only changes visually.
enemy-scale-setting= Ranges (.1-10). Multiples values by this number. .1 will make them smaller.  10 is way too big. Use with caution.  Only changes visually. 